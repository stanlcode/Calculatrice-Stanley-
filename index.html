<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculatrice Stanl</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <h2>Calculatrice Stanl </h2>
        <input id="display" readonly>
        <div class="keys">
            <button onclick="insert('+')" class="operator-btn">+</button>
            <button onclick="insert('7')" class="number-btn">7</button>
            <button onclick="insert('8')" class="number-btn">8</button>
            <button onclick="insert('9')" class="number-btn">9</button>
            <button onclick="insert('-')" class="operator-btn">-</button>
            <button onclick="insert('4')" class="number-btn">4</button>
            <button onclick="insert('5')" class="number-btn">5</button>
            <button onclick="insert('6')" class="number-btn">6</button>
            <button onclick="insert('*')" class="operator-btn">x</button>
            <button onclick="insert('1')" class="number-btn">1</button>
            <button onclick="insert('2')" class="number-btn">2</button>
            <button onclick="insert('3')" class="number-btn">3</button>
            <button onclick="insert('/')" class="operator-btn">/</button>
            <button onclick="insert('0')" class="number-btn">0</button>
            <button onclick="insert('.')" class="number-btn">.</button>
            <button onclick="toggleSign()">+/-</button>
            <button onclick="clearDisplay()" class="operator-btn">C</button>
            <button onclick="Del()" class="operator-btn">Del</button>
            <button onclick="calculate()" class="equal-btn">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
